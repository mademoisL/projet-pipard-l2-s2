<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMARTPARK | Inscription</title>
    <link rel="stylesheet" href="../CSS/Style.css">
</head>

<body class="page-centree" style="display: flex; flex-direction: column; min-height: 100vh; margin: 0;">

    <main style="flex: 1; display: flex; align-items: center; justify-content: center; padding: 80px 20px;">
        
        <div class="conteneur login-box" style="max-width: 550px; width: 100%; padding: 50px; box-sizing: border-box;">
            
            <div class="nav-left" style="justify-content: center; margin-bottom: 30px; display: flex; align-items: center; gap: 15px;">
                <img src="../Images/Logo sans nom.png" alt="Logo" class="header-logo" style="height: 45px; width: auto; filter: drop-shadow(0 0 5px white);">
                <div class="logo-text" style="margin: 0;">SMARTPARK</div>
            </div>

            <div class="ligne-texte">
                <div class="hr-container"></div>
                <h3>Créer un compte</h3>
                <div class="hr-container"></div>
            </div>

            <form id="inscriptionForm" onsubmit="register(event)">
                <div class="input-group">
                    <label for="prenom">Prénom</label>
                    <input type="text" id="prenom" placeholder="Votre prénom" required>
                </div>

                <div class="input-group">
                    <label for="nom">Nom</label>
                    <input type="text" id="nom" placeholder="Votre nom" required>
                </div>

                <div class="input-group">
                    <label for="email">Adresse email</label>
                    <input type="email" id="email" placeholder="nom@exemple.com" required>
                </div>

                <div class="input-group">
                    <label for="password">Mot de passe</label>
                    <input type="password" id="password" placeholder="Minimum 6 caractères" required>
                </div>

                <button type="submit" class="btn">Je m'inscris !</button>
            </form>

            <div class="links" style="display: flex; justify-content: center; margin-top: 20px;">
                <a href="Connexion.html">Se connecter</a>
            </div>
        </div>
    </main>

    <script>
        function register(event) {
            event.preventDefault(); // Empêche le rechargement brutal de la page

            let prenom = document.getElementById('prenom').value;
            let nom = document.getElementById('nom').value;
            let email = document.getElementById('email').value;
            let password = document.getElementById('password').value;

            // Récupérer les utilisateurs existants
            let users = JSON.parse(localStorage.getItem('users')) || [];

            // Vérifier si l'email existe déjà
            if (users.find(user => user.email === email)) {
                alert("Cet email est déjà utilisé. Veuillez vous connecter.");
                return;
            }

            // Ajouter le nouvel utilisateur
            users.push({ prenom, nom, email, password });
            localStorage.setItem('users', JSON.stringify(users));

            // Redirection immédiate vers la page de connexion (plus pro qu'un popup)
            window.location.href = 'Connexion.html';
        }
    </script>

</body>
</html>
